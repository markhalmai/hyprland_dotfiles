[window]
opacity = 0.6
padding = { x = 14, y = 12 }
decorations = "full"

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size = 11.0

[cursor]
style = { shape = "Block", blinking = "On" }
unfocused_hollow = false
thickness = 0.15

# macOS-style pastel accents (soft, not neon)
[colors.primary]
background = "#232326"   # true graphite (neutral)
foreground = "#e6e6e8"

[colors.normal]
black   = "#232326"
red     = "#f28fad"   # soft rose
green   = "#a6da95"   # mint
yellow  = "#eed49f"   # warm pastel
blue    = "#8aadf4"   # mac system blue
magenta = "#c6a0f6"   # soft lavender
cyan    = "#8bd5ca"   # muted aqua
white   = "#cad3f5"

[colors.bright]
black   = "#2f2f33"
red     = "#f28fad"
green   = "#a6da95"
yellow  = "#eed49f"
blue    = "#8aadf4"
magenta = "#c6a0f6"
cyan    = "#8bd5ca"
white   = "#ffffff"

[colors.cursor]
text = "#232326"
cursor = "#e6e6e8"

[colors.selection]
text = "#232326"
background = "#b7bdf8"

[mouse]
hide_when_typing = true

[keyboard]
bindings = [
  { key = "Enter", mods = "Control|Shift", action = "SpawnNewInstance" }
]